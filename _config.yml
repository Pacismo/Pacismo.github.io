# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: "Santana"
#email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  Landing page for my domain.
  I am a software developer.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://franciscosp.com" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: &twitter pacismo
github_username: &github pacismo
google_analytics: &ua-analytics null # Google's analytics tools are too invasive.
# GA4_analytics: G-6WXCCETQ9V

locale: "en-US"

# Build settings
# Remote themes on GitHub Pages must be configured with this tag:
remote_theme: mmistakes/minimal-mistakes # see: https://mmistakes.github.io/minimal-mistakes/docs/
minimal_mistakes_skin: "dirt"

logo: null
masthead_title: "Francisco Santana"

paginate_path: /page:num

title_separator: "|"
subtitle: "General Blog"
name: "Francisco Santana-Pardo"
repository: "pacismo/pacismo.github.io"
search: true
breadcrumbs: false

############################################################
# Site configuration for the Jekyll 3 Pagination Gem
# The values here represent the defaults if nothing is set
pagination:
  
  # Site-wide kill switch, disabled here it doesn't run at all 
  enabled: true

  # Set to 'true' to enable pagination debugging. This can be enabled in the site config or only for individual pagination pages
  debug: false

  # The default document collection to paginate if nothing is specified ('posts' is default)
  collection: 'posts'

  # How many objects per paginated page, used to be `paginate` (default: 0, means all)
  per_page: 10

  # The permalink structure for the paginated pages (this can be any level deep)
  permalink: '/page-:num/' # Pages are index.html inside this folder (default)
  #permalink: '/page/:num.html' # Pages are simple html files 
  #permalink: '/page/:num' # Pages are html files, linked jekyll extensionless permalink style.

  # Optional the title format for the paginated pages (supports :title for original page title, :num for pagination page number, :max for total number of pages)
  title: ':title - page :num'

  # Limit how many pagenated pages to create (default: 0, means all)
  limit: 0
  
  # Optional, defines the field that the posts should be sorted on (omit to default to 'date')
  sort_field: 'date'

  # Optional, sorts the posts in reverse order (omit to default decending or sort_reverse: true)
  sort_reverse: true

  # Optional, the default category to use, omit or just leave this as 'posts' to get a backwards-compatible behavior (all posts)
  category: 'posts'

  # Optional, the default tag to use, omit to disable
  tag: ''

  # Optional, the default locale to use, omit to disable (depends on a field 'locale' to be specified in the posts, 
  # in reality this can be any value, suggested are the Microsoft locale-codes (e.g. en_US, en_GB) or simply the ISO-639 language code )
  locale: '' 

 # Optional,omit or set both before and after to zero to disable. 
 # Controls how the pagination trail for the paginated pages look like. 
  trail: 
    before: 2
    after: 2

  # Optional, the default file extension for generated pages (e.g html, json, xml).
  # Internally this is set to html by default
  extension: html

  # Optional, the default name of the index file for generated pages (e.g. 'index.html')
  # Without file extension
  indexpage: 'index'

############################################################

collections:
  posts:
    output: true
    permalink: /:collection/:title
  archives:
    output: true
    permalink: /:path
  portfolio:
    output: true
    permalink: /:collection/:path

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      show_date: true
      read_time: true
      author_profile: true
      author: Francisco Santana
      comments: false
      share: true
      related: true
      toc: true
      toc_sticky: true
      toc_icon: cog
      toc_label: "Table of Contents"
      header:
        teaser: null
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      show_date: false
      read_time: false
      author_profile: false
      comments: false
      share: false
  # _articles
  - scope:
      path: ""
      type: articles
    values:
      layout: single
      show_date: true
      read_time: true
      author_profile: true
      comments: false
      share: true
      author: Francisco Santana
      related: true
      toc: true
      toc_sticky: true
      toc_icon: cog
      toc_label: "Table of Contents"
      header:
        teaser: null
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: false

category_archive:
  type: jekyll-archives
  path: /categories/
tag_archive:
  type: jekyll-archives
  path: /tags/
year_archive:
  type: jekyll-archives
  path: /year/

jekyll-archives:
  enabled:
    - categories
    - tags
    - year
  layouts:
    category: archive-taxonomy
    tag: archive-taxonomy
    year: archive-taxonomy
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/
    year: /year/:year/

twitter:
  username: *twitter
social:
  type: Person
  name: "Francisco Santana-Pardo"
  links:
    - "https://twitter.com/pacismo"
    - "https://instagram.com/pacismo"
    - "https://github.com/pacismo"
    - "https://www.linkedin.com/in/francisco-santana-0a5205204/"

footer:
  links:
    - label: "About Me"
      url: "/about/"
      icon: "fa fa-id-card"

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache

# Add the following folders to the website.
include: ["_pages", "_icons", "_assets"]

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - New-Post.ps1
  - Start-Test.ps1
  - Remove-Cache.ps1
  - README.md
  - github-pages.code-workspace
  - CNAME
  - Gemfile
  - Gemfile.lock
  - .nojekyll
  - .github
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
